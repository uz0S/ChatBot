<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>روابط واتساب - كلية التكنو</title>
  <style>
    :root {
      --primary: #4776E6;
      --secondary: #8E54E9;
      --bg: #f0f2f5;
      --text: #333;
    }

    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 30px 20px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      animation: slideUp 0.6s ease-out;
      margin-bottom: 20px;
    }

    h2 {
      text-align: center;
      color: var(--primary);
      margin-top: 0;
      font-size: 22px;
      font-weight: 800;
    }

    /* شريط البحث الذكي */
    .search-box {
      position: relative;
      margin-bottom: 25px;
    }

    .search-box input {
      width: 100%;
      padding: 16px 45px 16px 16px;
      font-size: 16px;
      border: 2px solid #e1e1e1;
      border-radius: 16px;
      outline: none;
      transition: all 0.3s;
      background: #fff;
    }

    .search-box input:focus {
      border-color: var(--secondary);
      box-shadow: 0 0 15px rgba(142, 84, 233, 0.2);
    }

    .search-icon {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: #888;
    }

    /* قائمة النتائج */
    .results-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 5px;
    }

    /* تخصيص شريط التمرير */
    .results-container::-webkit-scrollbar { width: 6px; }
    .results-container::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

    .course-card {
      background: #fff;
      border: 1px solid #eee;
      padding: 15px;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeIn 0.4s ease;
    }

    .course-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      border-color: var(--primary);
    }

    .course-name {
      font-weight: bold;
      color: var(--text);
      font-size: 15px;
      flex: 1;
    }

    .join-btn {
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: bold;
      transition: opacity 0.3s;
      white-space: nowrap;
      margin-right: 10px;
    }

    .join-btn:hover { opacity: 0.8; }

    /* رسالة عدم وجود نتائج */
    .no-results {
      text-align: center;
      padding: 20px;
      color: #666;
    }
    .request-btn {
      display: inline-block;
      margin-top: 10px;
      background: var(--primary);
      color: #fff;
      padding: 10px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
    }

    /* لوحة الأدمن */
    #admin-section {
      display: none;
      background: #fff;
      border: 2px dashed var(--secondary);
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
      animation: fadeIn 0.4s ease;
    }

    .admin-input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 14px;
    }

    .save-btn {
      width: 100%;
      padding: 12px;
      background: var(--secondary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .admin-list { margin-top: 15px; }
    .admin-item {
      display: flex;
      justify-content: space-between;
      background: #f9f9f9;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .del-btn { background: #ff4757; color: #fff; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; }

    /* التوقيع الشخصي والفوتر */
    .footer {
      width: 100%;
      max-width: 500px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
      color: rgba(255,255,255,0.9);
      font-size: 14px;
    }

    .creator-badge {
      background: rgba(0,0,0,0.2);
      padding: 8px 15px;
      border-radius: 20px;
      backdrop-filter: blur(5px);
      font-weight: bold;
      letter-spacing: 1px;
    }

    .creator-badge span { color: #ffd700; }

    .admin-trigger {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: rgba(255,255,255,0.7);
      transition: 0.3s;
    }
    .admin-trigger:hover { transform: rotate(90deg); color: white; }

    /* الحركات (Animations) */
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* تحسينات الشاشات الصغيرة جداً */
    @media (max-width: 400px) {
      .course-card { flex-direction: column; text-align: center; gap: 10px; }
      .join-btn { width: 100%; margin: 0; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <h2>📚 دليل مواد كلية التكنو</h2>
    
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="ابحث عن اسم المادة هنا..." onkeyup="handleSearch()">
    </div>

    <div class="results-container" id="resultsList">
      <div class="no-results">⏳ جاري الاتصال بقاعدة البيانات...</div>
    </div>

    <div id="admin-section">
      <h3 style="margin-top: 0; color: var(--secondary); text-align: center;">⚙️ إدارة الجروبات</h3>
      <input type="text" id="newCourseName" class="admin-input" placeholder="اسم المادة">
      <input type="url" id="newCourseLink" class="admin-input" placeholder="رابط جروب الواتساب">
      <button class="save-btn" onclick="addOrUpdateCourse()">حفظ المادة</button>
      
      <div class="admin-list" id="adminList"></div>
    </div>
  </div>

  <div class="footer">
    <div class="creator-badge">Developed by <span>MOHAMMAD RUM</span></div>
    <button class="admin-trigger" onclick="toggleAdmin()">⚙️</button>
  </div>

  <script type="module">
    import { neon } from 'https://esm.sh/@neondatabase/serverless';

    // الرابط الخاص بقاعدة بياناتك في Neon
    const DATABASE_URL = "postgresql://neondb_owner:npg_YOi4l2uLocSN@ep-gentle-wind-aifr1t59-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require";
    const sql = neon(DATABASE_URL);
    
    let allCourses = [];

    // 1. جلب البيانات عند فتح الصفحة
    window.fetchCourses = async function() {
      try {
        const rows = await sql`SELECT name, link FROM courses ORDER BY name ASC`;
        allCourses = rows;
        renderResults(allCourses); // عرض كل المواد مبدئياً
        if(document.getElementById('admin-section').style.display === 'block') renderAdminList();
      } catch (error) {
        console.error(error);
        document.getElementById("resultsList").innerHTML = `<div class="no-results" style="color:red;">❌ تعذر الاتصال بقاعدة البيانات. تأكد من إعدادات Neon.</div>`;
      }
    }

    // 2. البحث الذكي (يتم تنفيذه مع كل حرف يكتبه المستخدم)
    window.handleSearch = function() {
      const query = document.getElementById("searchInput").value.trim().toLowerCase();
      
      if (query === "") {
        renderResults(allCourses);
        return;
      }

      // تصفية المواد التي تحتوي على الحروف المكتوبة
      const filtered = allCourses.filter(course => course.name.toLowerCase().includes(query));
      
      if (filtered.length > 0) {
        renderResults(filtered);
      } else {
        // إذا لم يجد شيئاً، يظهر زر إرسال رسالة لك
        document.getElementById("resultsList").innerHTML = `
          <div class="no-results">
            لم أجد مادة بهذا الاسم 😥<br>
            <a href="https://wa.me/962787260414?text=مرحبا%20اريد%20اضافة%20مادة%20(${encodeURIComponent(query)})" target="_blank" class="request-btn">🚀 أرسل طلب إضافة للآدمن</a>
          </div>
        `;
      }
    }

    // 3. عرض بطاقات المواد للطلاب
    function renderResults(coursesArray) {
      const container = document.getElementById("resultsList");
      container.innerHTML = "";
      
      if(coursesArray.length === 0) {
          container.innerHTML = `<div class="no-results">لا يوجد مواد مضافة حتى الآن.</div>`;
          return;
      }

      coursesArray.forEach(course => {
        container.innerHTML += `
          <div class="course-card">
            <div class="course-name">${course.name}</div>
            <a href="${course.link}" target="_blank" class="join-btn">انضم للجروب</a>
          </div>
        `;
      });
    }

    // ==========================================
    // قسم الإدارة
    // ==========================================
    
    window.toggleAdmin = function() {
      const adminSec = document.getElementById("admin-section");
      if (adminSec.style.display === "block") {
        adminSec.style.display = "none";
        return;
      }
      const pass = prompt("أدخل كلمة مرور الأدمن:");
      if (pass === "MOHA12022") {
        adminSec.style.display = "block";
        renderAdminList();
      } else if (pass !== null) {
        alert("كلمة المرور غير صحيحة!");
      }
    }

    function renderAdminList() {
      const list = document.getElementById("adminList");
      list.innerHTML = "";
      allCourses.forEach(course => {
        list.innerHTML += `
          <div class="admin-item">
            <span>${course.name}</span>
            <button class="del-btn" onclick="deleteCourse('${course.name}')">حذف</button>
          </div>
        `;
      });
    }

    window.addOrUpdateCourse = async function() {
      const name = document.getElementById("newCourseName").value.trim();
      const link = document.getElementById("newCourseLink").value.trim();
      if (!name || !link) return alert("الرجاء إدخال اسم المادة والرابط!");

      const btn = document.querySelector(".save-btn");
      btn.innerText = "⏳ جاري الحفظ...";
      
      try {
        await sql`INSERT INTO courses (name, link) VALUES (${name}, ${link}) ON CONFLICT (name) DO UPDATE SET link = EXCLUDED.link`;
        document.getElementById("newCourseName").value = '';
        document.getElementById("newCourseLink").value = '';
        await window.fetchCourses(); // تحديث القوائم
        document.getElementById("searchInput").value = ''; // تفريغ البحث
      } catch (error) {
        alert("حدث خطأ أثناء الحفظ!");
      } finally {
        btn.innerText = "حفظ المادة";
      }
    }

    window.deleteCourse = async function(courseName) {
      if (!confirm(`حذف مادة ${courseName}؟`)) return;
      try {
        await sql`DELETE FROM courses WHERE name = ${courseName}`;
        await window.fetchCourses();
      } catch (error) {
        alert("حدث خطأ أثناء الحذف!");
      }
    }

    // تشغيل التطبيق
    window.onload = window.fetchCourses;
  </script>
</body>
</html>
